  <style>
    :root{--bg:#050F1A;--bg2:#081828;--bg-card:#0B1E30;--bg-card-h:#0F2440;--border:rgba(0,200,230,0.10);--border-h:rgba(0,200,230,0.22);--text:#E8F4FF;--muted:#7AAABF;--dim:#2A4A60;--cyan:#00D4FF;--blue:#2D7FF9;--teal:#00BFA5;--purple:#7C4DFF;--green:#1DE9B6;--orange:#FF8C42;--yellow:#FFD740;--red:#FF5370;--indigo:#82B1FF}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Nunito Sans',sans-serif;font-weight:400;line-height:1.65;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    h1,h2,h3,h4{font-family:'Nunito',sans-serif;line-height:1.2}
    a{text-decoration:none;color:inherit}
    .container{max-width:1080px;margin:0 auto;padding:0 24px}
    section{padding:96px 0}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:rgba(5,15,26,0.85);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
    .nav-logo{display:flex;align-items:center;gap:10px;font-family:'Nunito',sans-serif;font-weight:800;font-size:1.15rem}
    .nav-icon{width:34px;height:34px;border-radius:8px;overflow:hidden;flex-shrink:0}
    .nav-icon img{width:100%;height:100%;object-fit:cover;display:block}
    .lang-switcher{display:flex;gap:3px;background:rgba(0,200,230,.07);border:1px solid var(--border);border-radius:10px;padding:3px}
    .lang-btn{padding:5px 13px;border:none;background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:800;font-size:.75rem;letter-spacing:.06em;cursor:pointer;border-radius:7px;transition:all .2s}
    .lang-btn:hover{color:var(--text);background:rgba(0,200,230,.09)}
    .lang-btn.active{background:var(--cyan);color:#000}
    @media(max-width:520px){.lang-btn{padding:4px 8px;font-size:.68rem;letter-spacing:.02em}.lang-switcher{padding:2px}}
    #hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:130px 24px 80px;position:relative;overflow:hidden}
    .hero-bg{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(45,114,210,.35) 0%,transparent 70%),radial-gradient(ellipse 60% 50% at 20% 80%,rgba(0,191,165,.18) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 70%,rgba(0,212,255,.12) 0%,transparent 55%)}
    .hero-grid{position:absolute;inset:0;z-index:0;opacity:.06;background-image:linear-gradient(rgba(0,212,255,.6) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.6) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%)}
    .hero-inner{position:relative;z-index:2;max-width:680px}
    .hero-app-icon{width:100px;height:100px;border-radius:24px;overflow:hidden;margin:0 auto 24px;display:block;box-shadow:0 20px 60px rgba(45,114,210,.55),0 0 0 1px rgba(255,255,255,.08);animation:fadeUp .7s ease both}
    .hero-app-icon img{width:100%;height:100%;object-fit:cover;display:block}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.28);border-radius:100px;font-size:.76rem;font-weight:700;color:var(--cyan);letter-spacing:.06em;text-transform:uppercase;margin-bottom:22px;animation:fadeUp .7s ease .1s both}
    .badge-dot{width:6px;height:6px;background:var(--cyan);border-radius:50%;animation:blink 2.2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
    h1{font-family:'Nunito',sans-serif;font-size:clamp(3.2rem,9vw,6rem);font-weight:900;letter-spacing:-.02em;background:linear-gradient(140deg,#fff 20%,rgba(180,225,255,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;animation:fadeUp .7s ease .2s both}
    .hero-tagline{font-family:'Nunito',sans-serif;font-size:clamp(1.2rem,3.5vw,1.8rem);font-weight:800;color:var(--text);margin-bottom:24px;animation:fadeUp .7s ease .3s both}
    .hero-desc{font-size:1.15rem;color:var(--muted);line-height:1.75;margin-bottom:40px;animation:fadeUp .7s ease .4s both}
    .hero-cta{display:inline-flex;align-items:center;gap:10px;padding:15px 30px;background:var(--cyan);border-radius:100px;color:#000;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;animation:fadeUp .7s ease .5s both;transition:opacity .2s}
    .hero-cta:hover{opacity:.88}
    .hero-cta .pill{background:rgba(0,0,0,.15);padding:3px 10px;border-radius:100px;font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
    .hero-trust{font-size:.9rem;color:var(--muted);margin-top:14px;letter-spacing:.02em;opacity:.9}
    @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
    .stats-bar{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:36px 0}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr)}
    .stat{text-align:center;padding:0 20px;border-right:1px solid var(--border)}
    .stat:last-child{border-right:none}
    .stat-num{font-family:'Nunito',sans-serif;font-size:2.5rem;font-weight:900;color:var(--cyan);display:block;line-height:1;margin-bottom:6px}
    .stat-lbl{font-size:.83rem;color:var(--muted);font-weight:600}
    .sec-label{display:inline-block;font-family:'Nunito',sans-serif;font-size:.7rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin-bottom:14px}
    .sec-title{font-size:clamp(1.7rem,4vw,2.6rem);font-weight:800;letter-spacing:-.02em;margin-bottom:14px}
    .sec-sub{font-size:1.05rem;color:var(--muted);max-width:540px;line-height:1.75}
    .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center}
    .features-list{display:flex;flex-direction:column;gap:16px;margin-top:32px}
    .feat{display:flex;gap:14px;align-items:flex-start;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;transition:border-color .25s}
    .feat:hover{border-color:var(--border-h)}
    .feat-ico{width:40px;height:40px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.15rem;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.15)}
    .feat h4{font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;margin-bottom:3px}
    .feat p{font-size:.92rem;color:var(--muted);line-height:1.6}
    .phone-wrap{display:flex;justify-content:center}
    .phone{width:220px;background:#050A12;border-radius:40px;border:2px solid rgba(0,200,230,.2);overflow:hidden;position:relative;box-shadow:0 32px 72px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.06)}
    .phone img{width:100%;display:block}
    .notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:84px;height:22px;background:#000;border-radius:11px;z-index:10}
    #categories{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:44px}
    .cat-card{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden;transition:all .3s;cursor:default}
    .cat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--c);border-radius:2px 2px 0 0}
    .cat-card:hover{border-color:var(--c);transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.45);background:var(--bg-card)}
    .cat-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .cat-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);flex-shrink:0}
    .cat-name{font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:800;color:var(--text);line-height:1.25}
    .cat-num{font-family:'Nunito',sans-serif;font-size:1.9rem;font-weight:900;color:var(--c);line-height:1}
    .cat-ex{font-size:.73rem;color:var(--dim);margin-top:3px}
    .cat-desc{font-size:.88rem;color:var(--muted);margin-top:10px;line-height:1.55;border-top:1px solid var(--border);padding-top:10px}
    .sci-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px}
    .sci-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:22px;transition:all .3s}
    .sci-card:hover{border-color:rgba(0,212,255,.25);background:var(--bg-card-h)}
    .sci-author{font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;color:var(--cyan)}
    .sci-year{font-size:.73rem;color:var(--dim);margin-bottom:10px}
    .sci-title{font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:7px;line-height:1.35}
    .sci-desc{font-size:.9rem;color:var(--muted);line-height:1.6}
    .sci-hint{font-size:.72rem;color:var(--cyan);margin-top:10px;letter-spacing:.04em;transition:opacity .3s;display:block}
    .sci-expand{font-size:.88rem;color:var(--text);line-height:1.7;max-height:0;overflow:hidden;opacity:0;transition:max-height .45s ease,opacity .35s ease}
    .sci-card.sci-open{border-color:rgba(0,212,255,.4)!important;background:var(--bg-card-h)!important}
    .sci-card.sci-open .sci-expand{border-top:1px solid var(--border);margin-top:14px;padding-top:14px}
    .tgt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-top:44px}
    .tgt-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:30px 22px;text-align:center;transition:all .3s}
    .tgt-card:hover{transform:translateY(-5px);border-color:var(--border-h)}
    .tgt-em{font-size:2.4rem;display:block;margin-bottom:14px}
    .tgt-title{font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:800;margin-bottom:10px}
    .tgt-desc{font-size:.95rem;color:var(--muted);line-height:1.65}
    #features{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .diff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:44px}
    .diff-item{background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:22px;display:flex;gap:16px;align-items:flex-start;transition:all .3s}
    .diff-item:hover{border-color:rgba(0,212,255,.22);background:var(--bg-card)}
    .diff-ico{width:44px;height:44px;border-radius:12px;flex-shrink:0;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.18);display:flex;align-items:center;justify-content:center;font-size:1.2rem}
    .diff-item h4{font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:800;margin-bottom:5px}
    .diff-item p{font-size:.92rem;color:var(--muted);line-height:1.6}
    .screens-row{display:flex;gap:24px;justify-content:center;margin-top:56px;flex-wrap:wrap;align-items:flex-end}
    .screen-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
    .screen-lbl{font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .screen-frame{border-radius:36px;border:2px solid rgba(0,200,230,.18);overflow:hidden;position:relative;box-shadow:0 28px 60px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.04)}
    .screen-notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:74px;height:20px;background:#000;border-radius:10px;z-index:10}
    .screen-frame img{width:100%;display:block}
    #cta{text-align:center;background:linear-gradient(160deg,rgba(45,114,210,.25) 0%,rgba(0,191,165,.18) 100%);border-top:1px solid rgba(45,114,210,.3)}
    .cta-pill{display:inline-block;padding:7px 18px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);border-radius:100px;font-size:.76rem;color:var(--cyan);font-family:'Nunito',sans-serif;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:22px}
    .cta-title{font-size:clamp(2rem,5vw,3rem);font-weight:900;letter-spacing:-.02em;margin-bottom:14px}
    .cta-sub{font-size:1rem;color:var(--muted);margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto;line-height:1.75}
    .app-store-btn{display:inline-flex;align-items:center;gap:14px;padding:16px 32px;background:var(--cyan);border-radius:16px;color:#000;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;transition:opacity .2s}
    .app-store-btn:hover{opacity:.88}
    .app-store-btn .tag{background:rgba(0,0,0,.15);padding:3px 10px;border-radius:100px;font-size:.72rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
    footer{background:#030A14;border-top:1px solid var(--border);padding:48px 0;text-align:center}
    .footer-logo{display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1.2rem;margin-bottom:18px}
    .footer-logo-icon{width:28px;height:28px;border-radius:7px;overflow:hidden}
    .footer-logo-icon img{width:100%;height:100%;object-fit:cover;display:block}
    .footer-links{display:flex;gap:28px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
    .footer-links a{font-size:.86rem;color:var(--muted);transition:color .2s;font-weight:600}
    .footer-links a:hover{color:var(--cyan)}
    .footer-copy{font-size:.76rem;color:var(--dim)}
    .glow-divider{height:1px;width:100%;background:linear-gradient(90deg,transparent,var(--teal),var(--cyan),var(--blue),transparent);opacity:.3}
    .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}
    .reveal.in{opacity:1;transform:none}
    .reveal-d1{transition-delay:.1s}.reveal-d2{transition-delay:.2s}.reveal-d3{transition-delay:.3s}
    @media(max-width:900px){.sci-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr)}.stat{border-right:none;border-bottom:1px solid var(--border);padding:16px}.stat:nth-child(2n){border-left:1px solid var(--border)}.stat:nth-child(3),.stat:nth-child(4){border-bottom:none}.about-grid{grid-template-columns:1fr;gap:40px}.phone-wrap{display:none}.cat-grid{grid-template-columns:repeat(2,1fr)}.sci-grid{grid-template-columns:1fr}.tgt-grid{grid-template-columns:1fr}.diff-grid{grid-template-columns:1fr}section{padding:64px 0}.screens-row{gap:14px}.screen-frame{width:140px!important}}
  </style>
</head>

var _sciHints = {"it":"Tocca per saperne di più ▾","en":"Tap to learn more ▾","es":"Toca para saber más ▾","fr":"Touchez pour en savoir plus ▾","de":"Tippen für mehr ▾"};
function renderCats(lang) {
  const ex = {"it":"esercizi","en":"exercises","es":"ejercicios","fr":"exercices","de":"Übungen"};
  document.getElementById("catGrid").innerHTML = CATS.map(function(c) {
    return '<div class="cat-card reveal" style="--c:' + c.color + '"><div class="cat-head"><div class="cat-ico">' + c.icon + '</div><div class="cat-name">' + c[lang] + '</div></div><div class="cat-num">' + c.n + '</div><div class="cat-ex">' + ex[lang] + '</div><div class="cat-desc">' + (c[lang+"_desc"]||"") + '</div></div>';
  }).join("");
  observeReveal();
}
function renderSci(lang) {
  document.getElementById("sciGrid").innerHTML = SCI.map(function(s) {
    return '<div class="sci-card reveal" onclick="toggleSci(this)" style="cursor:pointer"><div class="sci-card-main"><div class="sci-author">' + s.author + '</div><div class="sci-year">' + s.year + '</div><div class="sci-title">' + s.title[lang] + '</div><div class="sci-desc">' + s.desc[lang] + '</div><div class="sci-hint">' + (_sciHints[lang]||"") + '</div></div><div class="sci-expand">' + (s.explain ? s.explain[lang] : "") + '</div></div>';
  }).join("");
  observeReveal();
}
function toggleSci(card) {
  var expand = card.querySelector(".sci-expand");
  var hint = card.querySelector(".sci-hint");
  var isOpen = card.classList.contains("sci-open");
  document.querySelectorAll(".sci-card.sci-open").forEach(function(c) {
    c.classList.remove("sci-open");
    c.querySelector(".sci-expand").style.maxHeight = "0";
    c.querySelector(".sci-expand").style.opacity = "0";
    c.querySelector(".sci-hint").style.opacity = "1";
  });
  if (!isOpen) {
    card.classList.add("sci-open");
    expand.style.maxHeight = expand.scrollHeight + "px";
    expand.style.opacity = "1";
    hint.style.opacity = "0";
  }
}
function renderTgt(lang) {
  document.getElementById("tgtGrid").innerHTML = TGT.map(function(t) {
    return '<div class="tgt-card reveal"><span class="tgt-em">' + t.emoji + '</span><div class="tgt-title">' + t.title[lang] + '</div><div class="tgt-desc">' + t.desc[lang] + '</div></div>';
  }).join("");
  observeReveal();
}
function renderFeats(lang) {
  document.getElementById("featGrid").innerHTML = FEATS.map(function(f) {
    return '<div class="diff-item reveal"><div class="diff-ico">' + f.icon + '</div><div><h4>' + f.title[lang] + '</h4><p>' + f.desc[lang] + '</p></div></div>';
  }).join("");
  observeReveal();
}
